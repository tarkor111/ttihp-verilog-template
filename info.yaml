project:
  title:        "Reaction Time Game"      # What people will see on the website
  author: "tarkor111"
  discord:      "taras4050"
  description:  "Measures button press reaction time and displays it in binary."
  top_module:   "tt_um_reaction_game"     # MUST match your Verilog module name
  languages:    "Verilog"
  clock_hz:     10000000


  tiles: "1x1" 
  source_files:
    - "project.v"

# How the 8 input pins (ui_in) are used
inputs:
  - button          # ui_in[0]
  - none            # ui_in[1]
  - none            # ui_in[2]
  - none            # ui_in[3]
  - none            # ui_in[4]
  - none            # ui_in[5]
  - none            # ui_in[6]
  - none            # ui_in[7]

# How the 8 output pins (uo_out) are used
outputs:
  - bit 0           # uo_out[0] - LSB of reaction time
  - bit 1           # uo_out[1]
  - bit 2           # uo_out[2]
  - bit 3           # uo_out[3]
  - bit 4           # uo_out[4]
  - bit 5           # uo_out[5]
  - bit 6           # uo_out[6]
  - bit 7           # uo_out[7] - MSB / Flash LED

# How the 8 bidirectional pins (uio_in/out) are used
bidirectional:
  - none            # uio_out[0]
  - none            # uio_out[1]
  - none            # uio_out[2]
  - none            # uio_out[3]
  - none            # uio_out[4]
  - none            # uio_out[5]
  - none            # uio_out[6]
  - none            # uio_out[7]


  yaml_version: 6
